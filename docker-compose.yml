services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./packages:/app/packages
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - organic-interface-network
    command: >
      sh -c "echo '========================================' &&
             echo '  Organic-Interface 启动信息' &&
             echo '========================================' &&
             echo '  服务端口: 3000' &&
             echo '  服务地址: http://localhost:3000' &&
             echo '  Node环境: development' &&
             echo '========================================' &&
             tail -f /dev/null"
    entrypoint: ["sh", "-c"]

networks:
  organic-interface-network:
    name: organic-interface-network