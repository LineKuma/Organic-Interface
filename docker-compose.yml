services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - organic-interface-network
    command: pnpm dev

  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
    networks:
      - organic-interface-network
    command: pnpm test
    profiles:
      - ci

networks:
  organic-interface-network:
    name: organic-interface-network